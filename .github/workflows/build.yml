name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v1

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Pull Git LFS
        run: git lfs pull

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libasound2-dev

      - name: Install Node.js and NPM
        uses: actions/setup-node@v2
        with:
          node-version: 16
          cache: npm

      - uses: actions/setup-python@v4 # https://github.com/nodejs/node-gyp/issues/2869
        with:
          python-version: '3.11'

      - name: npm install
        run: |
          npm install

      - name: npm test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # npm run lint
        # npm test
        run: |
          npm run package
          npm exec tsc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Captivate-${{ runner.os }}
          path: |
            release/build/*.AppImage
            release/build/*.dmg
            release/build/*.exe
  release:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts for all builds
        uses: actions/download-artifact@v4
        with:
          path: release/build
      - name: Create a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(jq -r .version release/app/package.json)"
          count="$(git rev-list --count HEAD)"
          sha="$(git rev-parse --short HEAD)"
          tag="$version-$count-$sha"
          gh release create --title "$tag" "$tag" || true
          gh release upload "$tag" release/build/* || true
